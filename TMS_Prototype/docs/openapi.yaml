openapi: 3.0.0
info:
  title: Task Management Service API
  version: '1.0'
  description: API for managing tasks in the TMS prototype.
servers:
  - url: http://localhost:8000
    description: Local server
paths:
  /tasks:
    get:
      summary: Get a list of tasks
      operationId: getTasks
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTask'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          description: Unique identifier for the task
        title:
          type: string
          description: Title of the task
        completed:
          type: boolean
          default: false
          description: Whether the task is completed
    NewTask:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          description: Title of the task to create